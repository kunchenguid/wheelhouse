name: ingest

# Fast path: a source repo (or a manual test) hands us an item that needs the
# maintainer's decision, and we create or refresh a decision-card issue for it.
# This path trusts the explicit dispatch payload; the scheduled scan's
# owner/maintainer/bot author filter is not applied here.
#
# Portability: the owner is github.repository_owner; the fleet + policy come from
# wheelhouse.config.yml. Nothing here is account-specific.

on:
  repository_dispatch:
    # `wheelhouse-item` is the current dispatch event type. `triage-item` is the
    # legacy alias kept for back-compat: source repos onboarded before the rename
    # still send it, so we keep listening for both rather than silently breaking
    # their live dispatchers. New source-repo workflows should send wheelhouse-item.
    types: [wheelhouse-item, triage-item]
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repo name (under your owner), e.g. my-service"
        required: true
      number:
        description: "Target PR/issue number"
        required: true
      kind:
        description: "pr-review | ci-approval | issue-triage"
        default: pr-review
      head_sha:
        description: "PR head SHA (recommended for pr-review/ci-approval)"
        required: false
      title:
        description: "Short title of the target"
        required: false
      summary:
        description: "One-line situation summary"
        required: false
      recommendation:
        description: "Recommended action"
        required: false
      priority:
        description: "high | med | low"
        default: med
      options:
        description: "Comma-separated checkbox option keys (optional)"
        required: false

permissions:
  contents: read
  issues: write

# Serialize per target so a dispatch and a manual run can't double-create or
# double-refresh a card.
concurrency:
  group: wheelhouse-ingest-${{ github.event.client_payload.repo || github.event.inputs.repo }}-${{ github.event.client_payload.number || github.event.inputs.number }}
  cancel-in-progress: false

jobs:
  ingest:
    # Owner-gate where applicable: repository_dispatch is already token-gated
    # (only a writer's token can send it); the manual path must be the owner.
    if: github.event_name == 'repository_dispatch' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Normalize payload -> item.json
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          INPUT_REPO: ${{ github.event.inputs.repo }}
          INPUT_NUMBER: ${{ github.event.inputs.number }}
          INPUT_KIND: ${{ github.event.inputs.kind }}
          INPUT_HEAD_SHA: ${{ github.event.inputs.head_sha }}
          INPUT_TITLE: ${{ github.event.inputs.title }}
          INPUT_SUMMARY: ${{ github.event.inputs.summary }}
          INPUT_RECOMMENDATION: ${{ github.event.inputs.recommendation }}
          INPUT_PRIORITY: ${{ github.event.inputs.priority }}
          INPUT_OPTIONS: ${{ github.event.inputs.options }}
        run: python scripts/build_item.py item.json

      - name: Create or refresh the decision card
        env:
          # Cards live in THIS repo: the default token is correct, and using it
          # keeps card activity from re-triggering the decision handler.
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/render_card.py upsert --item-file item.json
