name: Agent Runtime canary

on:
  pull_request:
    paths:
      - ".github/workflows/agent-runtime-canary.yml"
      - ".github/workflows/claude-model.yml"
      - "agent_runtime/**"
      - "scripts/apply_decision.py"
      - "scripts/auto_merge.py"
      - "scripts/render_card.py"
      - "scripts/wheelhouse_core.py"
      - "tests/fixtures/claude-action-native-output.test.ts"
      - "tests/fixtures/public_read/**"
      - "tests/test_public_read_broker.py"
      - "tests/run_public_advisory_model_e2e.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-read-security:
    name: Public read broker adversarial E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install the production Bubblewrap prerequisite
        run: |
          bash agent_runtime/install_direct_runtime.sh \
            sandbox agent_runtime/runtime.lock.json

      - name: Exercise real broker, adversary, SSRF, authority, and VISION paths
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python tests/test_public_read_broker.py --production-e2e

  direct-runtime:
    name: Direct runtime sandbox and install
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Exercise the production Bubblewrap prerequisite
        run: |
          bash agent_runtime/install_direct_runtime.sh \
            sandbox agent_runtime/runtime.lock.json
          python - <<'PY'
          from agent_runtime.sandbox import host_proof
          proof = host_proof("claude-cli")
          assert proof["implementation"] == "bubblewrap-network-namespace-v1"
          assert proof["externalSandbox"] is True
          assert proof["networkProxy"] is True
          assert proof["testOnly"] is False
          PY

      - name: Verify the production Claude binary without credentials
        run: |
          bash agent_runtime/install_direct_runtime.sh \
            claude agent_runtime/runtime.lock.json "$RUNNER_TEMP/wheelhouse-claude-cli"

  public-advisory-product:
    name: Public advisory real-model product E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install exact production sandbox and Claude 2.1.215
        run: |
          bash agent_runtime/install_direct_runtime.sh \
            sandbox agent_runtime/runtime.lock.json
          bash agent_runtime/install_direct_runtime.sh \
            claude agent_runtime/runtime.lock.json "$RUNNER_TEMP/wheelhouse-claude-cli"

      - name: Prove exact advisory schema boundary on Claude 2.1.215
        env:
          WHEELHOUSE_CLAUDE_2_1_215_CANARY_BINARY: ${{ runner.temp }}/wheelhouse-claude-cli/claude
        run: python tests/test_agent_runtime_claude_adapter.py

      - name: Run fresh production advisory model path for both VISION fixtures
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          WHEELHOUSE_MODEL_E2E_EVIDENCE: ${{ runner.temp }}/public-advisory-model-e2e.json
          WHEELHOUSE_PUBLIC_FIXTURE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test -n "$CLAUDE_CODE_OAUTH_TOKEN"
          credential="$RUNNER_TEMP/wheelhouse-claude-oauth"
          trap 'rm -f "$credential"' EXIT
          umask 077
          printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" > "$credential"
          unset CLAUDE_CODE_OAUTH_TOKEN
          export WHEELHOUSE_CLAUDE_CREDENTIAL_FILE="$credential"
          export PATH="$RUNNER_TEMP/wheelhouse-claude-cli:$PATH"
          python tests/run_public_advisory_model_e2e.py

      - name: Preserve real-model evidence
        uses: actions/upload-artifact@v4
        with:
          name: public-advisory-real-model-evidence
          path: ${{ runner.temp }}/public-advisory-model-e2e.json
          if-no-files-found: error
          retention-days: 14

  claude-action-native-output:
    name: Claude Action native output contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Check out the exact production action
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: anthropics/claude-code-action
          ref: af0559ee4f514d1ef21826982bed13f7edc3c35e
          path: claude-code-action
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.23"

      - name: Run the no-spend native output fixture
        run: |
          cp tests/fixtures/claude-action-native-output.test.ts \
            claude-code-action/base-action/test/wheelhouse-native-output.test.ts
          cd claude-code-action/base-action
          bun install --frozen-lockfile
          bun test test/wheelhouse-native-output.test.ts
