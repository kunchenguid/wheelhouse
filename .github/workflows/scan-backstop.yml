name: scan-backstop

# The primary keep-current path. On a schedule (and on demand), scan the whole
# fleet, open cards for anything new that needs a decision, REFRESH an open
# `needs-decision` card whose target materially changed, and close cards whose
# target is merged/closed, plus pure pending cards whose open target no longer
# needs a maintainer decision - including owner/maintainer/bot-authored targets
# that the scan author filter now leaves out of the worklist - so the queue
# reflects current state and self-heals. The ingest event path still upserts on
# dispatch, but the hourly
# reconcile is what keeps cards fresh; running it hourly is safe precisely
# because reconcile refreshes only on a material change and is a full no-op
# otherwise (see reconcile.py / render_card.upsert_card, AGENTS.md "Card refresh").

on:
  schedule:
    - cron: "17 * * * *" # hourly, best-effort
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: wheelhouse-backstop
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install --quiet pyyaml

      # Cross-repo scan reads fleet state and may approve provably-safe fork-CI
      # runs, so this step requires FLEET_TOKEN with Actions write scope.
      - name: Scan the fleet
        env:
          GH_TOKEN: ${{ secrets.FLEET_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/wheelhouse_core.py scan > scan.json

      # Current open cards in THIS repo - default token.
      - name: List open cards
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue list --state open --json number,body,labels,title --limit 300 > cards.json

      # Reconcile (create, refresh, close) in THIS repo - default token, so
      # backstop activity never re-triggers the handler.
      - name: Reconcile the queue
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/reconcile.py scan.json cards.json
