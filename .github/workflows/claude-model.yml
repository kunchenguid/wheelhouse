name: claude-model

on:
  workflow_call:
    inputs:
      input_artifact: {required: true, type: string}
      handoff_sha256: {required: true, type: string}
      output_artifact: {required: true, type: string}
      expected_commit_sha: {required: true, type: string}
      correlation_id: {required: true, type: string}
      child_timeout_minutes: {required: true, type: number}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: {required: true}
      READONLY_TOKEN: {required: false}
    outputs:
      result_artifact:
        description: Bounded artifact containing the verified normalized result.
        value: ${{ jobs.finalize.outputs.result_artifact }}
      status:
        description: Normalized AgentResult status.
        value: ${{ jobs.finalize.outputs.status }}
      error_code:
        description: Stable normalized error code, empty on success.
        value: ${{ jobs.finalize.outputs.error_code }}
      observed_commit_sha:
        description: Caller commit observed by the separately permissioned model job.
        value: ${{ jobs.finalize.outputs.observed_commit_sha }}

permissions:
  actions: read
  contents: read

jobs:
  model:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.child_timeout_minutes }}
    steps:
      - id: source
        name: Bind the model job to the caller workflow revision
        env:
          EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
        run: |
          set -euo pipefail
          match=false
          if [ "$GITHUB_SHA" = "$EXPECTED_COMMIT_SHA" ]; then match=true; fi
          {
            echo "match=$match"
            echo "observed_sha=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Download immutable prepared handoff
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.input_artifact }}
          path: ${{ runner.temp }}/wheelhouse-handoff

      - id: hydrate
        name: Verify and hydrate the content-addressed workspace
        if: ${{ steps.source.outputs.match == 'true' }}
        env:
          HANDOFF: ${{ runner.temp }}/wheelhouse-handoff
          HANDOFF_SHA256: ${{ inputs.handoff_sha256 }}
          # Packaged verifier imports from the signed handoff tree. Bytecode stays
          # enabled, but PYTHONPYCACHEPREFIX is a disjoint RUNNER_TEMP directory so
          # no runtime file is written into the signed inventory before verify().
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/wheelhouse-pycache
        run: |
          set -euo pipefail
          mkdir -p "$PYTHONPYCACHEPREFIX"
          # Guard: cache prefix must never land inside the signed handoff tree.
          case "$PYTHONPYCACHEPREFIX" in
            "$HANDOFF"|"$HANDOFF"/*) echo "PYTHONPYCACHEPREFIX collides with signed handoff" >&2; exit 1 ;;
          esac
          unset PYTHONDONTWRITEBYTECODE
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          root = Path(os.environ["HANDOFF"])
          manifest = json.loads((root / "manifest.json").read_text())
          canonical = json.dumps(manifest["files"], sort_keys=True, separators=(",", ":")).encode()
          if manifest.get("manifestSha256") != os.environ["HANDOFF_SHA256"] or hashlib.sha256(canonical).hexdigest() != os.environ["HANDOFF_SHA256"]:
              raise SystemExit("handoff manifest identity mismatch")
          expected = {row["path"]: row for row in manifest["files"]}
          if len(expected) != len(manifest["files"]) or len(expected) > 32000 or sum(row["bytes"] for row in expected.values()) > 220000000:
              raise SystemExit("handoff manifest bound exceeded")
          observed = {}
          for path in sorted(root.rglob("*")):
              if path.is_symlink(): raise SystemExit("handoff symlink rejected")
              if path.is_file() and path.name != "manifest.json":
                  rel = path.relative_to(root).as_posix()
                  size = path.stat().st_size
                  if rel not in expected or size != expected[rel]["bytes"]: raise SystemExit("handoff file bound mismatch")
                  digest = hashlib.sha256()
                  with path.open("rb") as handle:
                      for chunk in iter(lambda: handle.read(1048576), b""): digest.update(chunk)
                  observed[rel] = {"path": rel, "bytes": size, "sha256": digest.hexdigest()}
          if observed != expected:
              raise SystemExit("handoff manifest mismatch")
          PY
          # Disjoint PYTHONPYCACHEPREFIX: bytecode may be written, but never into the
          # signed handoff before agent_runtime.claude_handoff.verify runs.
          PYTHONPATH="$HANDOFF/runtime" python -m agent_runtime.claude_handoff hydrate \
            --handoff "$HANDOFF" --workspace "$GITHUB_WORKSPACE"
          PYTHONPATH="$HANDOFF/runtime" python -m agent_runtime.admission \
            --task "$HANDOFF/bundle/task.json" --stage hydrated --status ok \
            --code handoff.hydrated \
            --deadline-ms "$(( ${{ inputs.child_timeout_minutes }} * 60000 ))"

      - name: Initialize bounded local repository
        if: ${{ steps.hydrate.outcome == 'success' }}
        run: |
          set -euo pipefail
          git init --quiet --initial-branch=wheelhouse-model
          git config user.name wheelhouse-runtime
          git config user.email wheelhouse-runtime@invalid
          git add --all
          git commit --quiet --allow-empty -m "Verified model input"
          test -z "$(git remote)"

      - name: Install bounded read-only search broker
        if: ${{ endsWith(steps.hydrate.outputs.action, '.search') }}
        env:
          HANDOFF: ${{ runner.temp }}/wheelhouse-handoff
          ALLOWED_REPOS: ${{ steps.hydrate.outputs.allowedRepos }}
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/wheelhouse-tools"
          mkdir -p "$tool_dir"
          cp "$HANDOFF/runtime/nl_readonly_search.py" "$tool_dir/wheelhouse-search"
          chmod 500 "$tool_dir" "$tool_dir/wheelhouse-search"
          echo "$tool_dir" >> "$GITHUB_PATH"
          echo "WHEELHOUSE_SEARCH_ALLOWED_REPOS=$ALLOWED_REPOS" >> "$GITHUB_ENV"

      - name: Write conservative pre-invocation checkpoint
        if: ${{ steps.hydrate.outcome == 'success' }}
        env:
          ACTION: ${{ steps.hydrate.outputs.action }}
          TASK_SHA: ${{ steps.hydrate.outputs.taskSha256 }}
          HANDOFF: ${{ runner.temp }}/wheelhouse-handoff
          HANDOFF_SHA256: ${{ inputs.handoff_sha256 }}
          ATTEMPT: ${{ runner.temp }}/wheelhouse-model-attempt
          ACTION_COMMIT: fad22eb3fa582b7357fc0ea48af6645851b884fd
          CHILD_TIMEOUT_MINUTES: ${{ inputs.child_timeout_minutes }}
          EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/wheelhouse-pycache
        run: |
          set -euo pipefail
          mkdir -p "$ATTEMPT" "$PYTHONPYCACHEPREFIX"
          case "$PYTHONPYCACHEPREFIX" in
            "$HANDOFF"|"$HANDOFF"/*) echo "PYTHONPYCACHEPREFIX collides with signed handoff" >&2; exit 1 ;;
          esac
          unset PYTHONDONTWRITEBYTECODE
          PYTHONPATH="$HANDOFF/runtime" python - <<'PY'
          import hashlib, json, os, subprocess
          from pathlib import Path
          from agent_runtime.claude_handoff import declared_output_paths, workspace_input_observation
          task = json.loads((Path(os.environ["HANDOFF"]) / "bundle" / "task.json").read_text(encoding="utf-8"))
          if (
              task.get("metadata", {}).get("wheelhouseRevision") != os.environ["EXPECTED_COMMIT_SHA"]
              or os.environ["GITHUB_SHA"] != os.environ["EXPECTED_COMMIT_SHA"]
          ):
              raise SystemExit("hydrated task source revision does not match the caller commit")
          child_timeout_ms = int(os.environ["CHILD_TIMEOUT_MINUTES"]) * 60000
          if child_timeout_ms != task["spec"]["limits"]["childExecutionTimeoutMs"]:
              raise SystemExit("child job timeout does not match AgentTask")
          declared_tools = next(row["constraints"]["exact"] for row in task["spec"]["capabilities"]["required"] if row["name"] == "tools.declared")
          input_observation = workspace_input_observation(task, os.environ["GITHUB_WORKSPACE"])
          local_repository = Path(".git").is_dir() and not subprocess.run(["git", "remote"], check=True, text=True, capture_output=True).stdout.strip()
          action_root = Path(os.environ["RUNNER_WORKSPACE"]).parent / "_actions" / "anthropics" / "claude-code-action" / os.environ["ACTION_COMMIT"]
          metadata = next((path for path in (action_root / "action.yml", action_root / "action.yaml") if path.is_file() and not path.is_symlink() and path.stat().st_size <= 1048576), None)
          metadata_sha = hashlib.sha256(metadata.read_bytes()).hexdigest() if metadata else None
          proof = {
              "version": 1,
              "boundary": "separate-read-only-github-job",
              "jobPermissions": {"actions": "read", "contents": "read", "issues": "none"},
              "writeCapableGithubTokenAvailable": False,
              "fleetTokenAvailable": False,
              "readonlyTokenBoundary": "broker-only" if os.environ["ACTION"].endswith(".search") else "absent",
              "spendStarted": True,
              "isolationLevel": "github-readonly-artifact-bridge-v1",
              "artifactHydration": "content-addressed-bounded-verified",
              "targetInputsReadOnly": False,
              "preActionInputObservationSha256": input_observation,
              "postActionInputObservationSha256": None,
              "declaredOutputPaths": declared_output_paths(task),
              "workspaceRepository": "local-no-remote" if local_repository else "unverified",
              "declaredTools": declared_tools,
              "action": os.environ["ACTION"],
              "actionSourceCommit": os.environ["ACTION_COMMIT"],
              "actionMetadataQuality": "verified-action-metadata" if metadata_sha else "pinned-action-reference",
              "actionMetadataSha256": metadata_sha,
              "taskSha256": os.environ["TASK_SHA"],
              "handoffManifestSha256": os.environ["HANDOFF_SHA256"],
              "transcriptSha256": None,
              "childExecutionTimeoutMs": child_timeout_ms,
          }
          (Path(os.environ["ATTEMPT"]) / "enforcement.json").write_text(json.dumps(proof, sort_keys=True, separators=(",", ":")) + "\n")
          PY

      - name: Upload durable pre-invocation checkpoint
        if: ${{ steps.hydrate.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_artifact }}-attempt
          path: ${{ runner.temp }}/wheelhouse-model-attempt/enforcement.json
          if-no-files-found: error
          retention-days: 1

      - name: Record durable checkpoint stage
        if: ${{ steps.hydrate.outcome == 'success' }}
        env:
          HANDOFF: ${{ runner.temp }}/wheelhouse-handoff
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/wheelhouse-pycache
        run: |
          set -euo pipefail
          mkdir -p "$PYTHONPYCACHEPREFIX"
          case "$PYTHONPYCACHEPREFIX" in
            "$HANDOFF"|"$HANDOFF"/*) echo "PYTHONPYCACHEPREFIX collides with signed handoff" >&2; exit 1 ;;
          esac
          unset PYTHONDONTWRITEBYTECODE
          PYTHONPATH="$HANDOFF/runtime" python -m agent_runtime.admission \
            --task "$HANDOFF/bundle/task.json" --stage checkpoint --status ok \
            --code checkpoint.written \
            --deadline-ms "$(( ${{ inputs.child_timeout_minutes }} * 60000 ))"

      - id: triage_search
        if: ${{ startsWith(steps.hydrate.outputs.action, 'triage.') && steps.hydrate.outputs.action != 'triage.schema-repair' && endsWith(steps.hydrate.outputs.action, '.search') }}
        continue-on-error: true
        env: {GH_TOKEN: "${{ secrets.READONLY_TOKEN }}", CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.READONLY_TOKEN }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          claude_args: "--allowedTools Read,Grep,Glob,Write,Bash(wheelhouse-search)\n--max-turns 32\n--model claude-sonnet-4-6"

      - id: triage_local
        if: ${{ startsWith(steps.hydrate.outputs.action, 'triage.') && steps.hydrate.outputs.action != 'triage.schema-repair' && endsWith(steps.hydrate.outputs.action, '.local') }}
        continue-on-error: true
        env: {CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          claude_args: "--allowedTools Read,Grep,Glob\n--max-turns 32\n--model claude-sonnet-4-6"

      - id: triage_repair
        if: ${{ steps.hydrate.outputs.action == 'triage.schema-repair' }}
        continue-on-error: true
        env: {CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          settings: '{"permissions":{"deny":["Bash","Read","Edit","Write","MultiEdit","NotebookEdit","Glob","Grep","WebFetch","WebSearch","Task"]}}'
          claude_args: "--allowedTools \"\"\n--max-turns 1\n--model claude-sonnet-4-6"

      - id: deep_search
        if: ${{ startsWith(steps.hydrate.outputs.action, 'deep-review.') && endsWith(steps.hydrate.outputs.action, '.search') }}
        env: {GH_TOKEN: "${{ secrets.READONLY_TOKEN }}", CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        continue-on-error: true
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.READONLY_TOKEN }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          claude_args: "--allowedTools Read,Grep,Glob,Write,Bash(wheelhouse-search)\n--max-turns 64\n--model claude-sonnet-4-6"

      - id: deep_local
        if: ${{ startsWith(steps.hydrate.outputs.action, 'deep-review.') && endsWith(steps.hydrate.outputs.action, '.local') }}
        env: {CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        continue-on-error: true
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          claude_args: "--allowedTools Read,Grep,Glob\n--max-turns 64\n--model claude-sonnet-4-6"

      - id: nl_search
        if: ${{ startsWith(steps.hydrate.outputs.action, 'nl-decision.') && steps.hydrate.outputs.action != 'nl-decision.schema-repair' && endsWith(steps.hydrate.outputs.action, '.search') }}
        env: {GH_TOKEN: "${{ secrets.READONLY_TOKEN }}", CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        continue-on-error: true
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.READONLY_TOKEN }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          claude_args: "--allowedTools Read,Grep,Glob,Write,Bash(wheelhouse-search)\n--max-turns 32\n--model claude-sonnet-4-6"

      - id: nl_local
        if: ${{ startsWith(steps.hydrate.outputs.action, 'nl-decision.') && steps.hydrate.outputs.action != 'nl-decision.schema-repair' && endsWith(steps.hydrate.outputs.action, '.local') }}
        env: {CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        continue-on-error: true
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          claude_args: "--allowedTools Read,Grep,Glob,Write\n--max-turns 32\n--model claude-sonnet-4-6"

      - id: nl_repair
        if: ${{ steps.hydrate.outputs.action == 'nl-decision.schema-repair' }}
        continue-on-error: true
        env: {CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"}
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          allowed_bots: github-actions[bot]
          allowed_non_write_users: ${{ github.actor }}
          prompt: ${{ steps.hydrate.outputs.prompt }}
          settings: '{"permissions":{"deny":["Bash","Read","Edit","Write","MultiEdit","NotebookEdit","Glob","Grep","WebFetch","WebSearch","Task"]}}'
          claude_args: "--allowedTools \"\"\n--max-turns 1\n--model claude-sonnet-4-6"

      - id: capture
        if: ${{ always() && steps.source.outputs.match == 'true' }}
        env:
          ACTION: ${{ steps.hydrate.outputs.action }}
          TASK_SHA: ${{ steps.hydrate.outputs.taskSha256 }}
          HANDOFF: ${{ runner.temp }}/wheelhouse-handoff
          HANDOFF_SHA256: ${{ inputs.handoff_sha256 }}
          EXECUTION_FILE: ${{ steps.triage_search.outputs.execution_file || steps.triage_local.outputs.execution_file || steps.triage_repair.outputs.execution_file || steps.deep_search.outputs.execution_file || steps.deep_local.outputs.execution_file || steps.nl_search.outputs.execution_file || steps.nl_local.outputs.execution_file || steps.nl_repair.outputs.execution_file }}
          OUTPUT: ${{ runner.temp }}/wheelhouse-model-output
          ATTEMPT: ${{ runner.temp }}/wheelhouse-model-attempt/enforcement.json
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/wheelhouse-pycache
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT" "$PYTHONPYCACHEPREFIX"
          case "$PYTHONPYCACHEPREFIX" in
            "$HANDOFF"|"$HANDOFF"/*) echo "PYTHONPYCACHEPREFIX collides with signed handoff" >&2; exit 1 ;;
          esac
          unset PYTHONDONTWRITEBYTECODE
          if [[ "${ACTION:-}" == nl-decision.* ]] && [ "$ACTION" != "nl-decision.schema-repair" ] && [ -f decision.json ] && [ ! -L decision.json ] && [ "$(wc -c < decision.json)" -le 131072 ]; then
            cp decision.json "$OUTPUT/decision.json"
          fi
          # Pre-hydration / pre-checkpoint failures never reach the durable spend
          # checkpoint. Write one bounded content-free stage record so the parent
          # receives a trusted no-spend result instead of a missing-file cascade.
          if [ ! -f "$ATTEMPT" ]; then
            python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          output = Path(os.environ["OUTPUT"])
          stage = os.environ.get("ACTION") and "pre-checkpoint" or "pre-hydration"
          if not (Path(os.environ.get("HANDOFF", "")) / "manifest.json").is_file():
              stage = "pre-hydration"
          expected_handoff = os.environ["HANDOFF_SHA256"]
          if len(expected_handoff) != 64 or any(c not in "0123456789abcdef" for c in expected_handoff):
              raise SystemExit("explicit handoff SHA input is invalid")
          proof = {
              "version": 1,
              "stage": stage,
              "stageStatus": "failed",
              "spendStarted": False,
              "transcriptSha256": None,
              "postActionInputObservationSha256": None,
              "targetInputsReadOnly": False,
              "handoffManifestSha256": expected_handoff,
              "handoffInputPathSha256": hashlib.sha256(os.environ["HANDOFF"].encode("utf-8")).hexdigest(),
              "handoffInputBound": bool(os.environ["HANDOFF"]),
          }
          (output / "enforcement.json").write_text(json.dumps(proof, sort_keys=True, separators=(",", ":")) + "\n", encoding="utf-8")
          PY
            if [ -f "$HANDOFF/bundle/task.json" ]; then
              PYTHONPATH="$HANDOFF/runtime" python -m agent_runtime.admission \
                --task "$HANDOFF/bundle/task.json" --stage output-captured \
                --status failed --code output.pre_checkpoint
            fi
            exit 0
          fi
          PYTHONPATH="$HANDOFF/runtime" python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          from agent_runtime.claude_handoff import workspace_input_observation
          from agent_runtime.contract import ContractError
          output = Path(os.environ["OUTPUT"])
          execution = output / "execution.json"
          source_name = os.environ.get("EXECUTION_FILE", "")
          source = Path(source_name) if source_name else None
          spent = bool(source and source.is_file() and not source.is_symlink())
          if spent and source.stat().st_size <= 8388608:
              try:
                  rows = json.loads(source.read_text(encoding="utf-8"))
                  if not isinstance(rows, list) or any(not isinstance(row, dict) for row in rows): raise ValueError
                  observed_models = [row.get("model") for row in rows if row.get("type") == "system" and row.get("subtype") == "init" and isinstance(row.get("model"), str) and row.get("model")]
                  if len(observed_models) == 1:
                      (output / "provider-started").write_text("", encoding="utf-8")
                  bounded = []
                  for row in rows:
                      if row.get("type") == "system" and row.get("subtype") == "init":
                          bounded.append({"type": "system", "subtype": "init", "model": row.get("model")})
                      elif row.get("type") == "assistant" and isinstance(row.get("message"), dict):
                          content = row["message"].get("content")
                          if isinstance(content, list): bounded.append({"type": "assistant", "message": {"content": [{"type": "tool_use"} for item in content if isinstance(item, dict) and item.get("type") == "tool_use"]}})
                      elif row.get("type") == "result":
                          kept = {key: row.get(key) for key in ("type", "subtype", "is_error", "result", "duration_ms", "num_turns")}
                          usage = row.get("usage")
                          if isinstance(usage, dict): kept["usage"] = {key: usage.get(key) for key in ("input_tokens", "output_tokens", "cache_read_input_tokens", "cache_creation_input_tokens")}
                          bounded.append(kept)
                  execution.write_text(json.dumps(bounded, sort_keys=True, separators=(",", ":")) + "\n")
              except (OSError, UnicodeError, ValueError, json.JSONDecodeError):
                  execution.write_text('[{"subtype":"invalid","type":"capture"}]\n')
          proof = json.loads(Path(os.environ["ATTEMPT"]).read_text(encoding="utf-8"))
          task = json.loads((Path(os.environ["HANDOFF"]) / "bundle" / "task.json").read_text(encoding="utf-8"))
          try:
              post_observation = workspace_input_observation(task, os.environ["GITHUB_WORKSPACE"])
          except (ContractError, OSError, ValueError):
              post_observation = None
          proof["postActionInputObservationSha256"] = post_observation
          proof["targetInputsReadOnly"] = post_observation is not None and post_observation == proof.get("preActionInputObservationSha256")
          proof["spendStarted"] = True
          proof["transcriptSha256"] = hashlib.sha256(execution.read_bytes()).hexdigest() if execution.is_file() else None
          (output / "enforcement.json").write_text(json.dumps(proof, sort_keys=True, separators=(",", ":")) + "\n")
          PY
          if [ -f "$OUTPUT/provider-started" ] && [ ! -L "$OUTPUT/provider-started" ]; then
            PYTHONPATH="$HANDOFF/runtime" python -m agent_runtime.admission \
              --task "$HANDOFF/bundle/task.json" --stage provider-started \
              --status ok --code provider.started \
              --deadline-ms "$(( ${{ inputs.child_timeout_minutes }} * 60000 ))"
            capture_status=ok; capture_code=output.captured
          else
            capture_status=failed; capture_code=output.missing
          fi
          PYTHONPATH="$HANDOFF/runtime" python -m agent_runtime.admission \
            --task "$HANDOFF/bundle/task.json" --stage output-captured \
            --status "$capture_status" --code "$capture_code" \
            --deadline-ms "$(( ${{ inputs.child_timeout_minutes }} * 60000 ))"

      - name: Upload bounded model transcript
        if: ${{ always() && steps.source.outputs.match == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_artifact }}
          path: ${{ runner.temp }}/wheelhouse-model-output
          if-no-files-found: error
          retention-days: 1

  finalize:
    if: ${{ always() }}
    needs: model
    runs-on: ubuntu-latest
    outputs:
      result_artifact: ${{ steps.result.outputs.result_artifact }}
      status: ${{ steps.result.outputs.status }}
      error_code: ${{ steps.result.outputs.error_code }}
      observed_commit_sha: ${{ steps.result.outputs.observed_commit_sha }}
    steps:
      - name: Download immutable prepared handoff
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.input_artifact }}
          path: ${{ runner.temp }}/wheelhouse-handoff

      - name: Verify the complete signed handoff before normalization
        env:
          HANDOFF: ${{ runner.temp }}/wheelhouse-handoff
          HANDOFF_SHA256: ${{ inputs.handoff_sha256 }}
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/wheelhouse-finalize-pycache
        run: |
          set -euo pipefail
          mkdir -p "$PYTHONPYCACHEPREFIX"
          case "$PYTHONPYCACHEPREFIX" in
            "$HANDOFF"|"$HANDOFF"/*) echo "PYTHONPYCACHEPREFIX collides with signed handoff" >&2; exit 1 ;;
          esac
          unset PYTHONDONTWRITEBYTECODE
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          root = Path(os.environ["HANDOFF"])
          manifest = json.loads((root / "manifest.json").read_text())
          canonical = json.dumps(manifest["files"], sort_keys=True, separators=(",", ":")).encode()
          if manifest.get("manifestSha256") != os.environ["HANDOFF_SHA256"] or hashlib.sha256(canonical).hexdigest() != os.environ["HANDOFF_SHA256"]:
              raise SystemExit("handoff manifest identity mismatch")
          expected = {row["path"]: row for row in manifest["files"]}
          if len(expected) != len(manifest["files"]) or len(expected) > 32000 or sum(row["bytes"] for row in expected.values()) > 220000000:
              raise SystemExit("handoff manifest bound exceeded")
          observed = {}
          for path in sorted(root.rglob("*")):
              if path.is_symlink(): raise SystemExit("handoff symlink rejected")
              if path.is_file() and path.name != "manifest.json":
                  rel = path.relative_to(root).as_posix()
                  size = path.stat().st_size
                  if rel not in expected or size != expected[rel]["bytes"]: raise SystemExit("handoff file bound mismatch")
                  digest = hashlib.sha256()
                  with path.open("rb") as handle:
                      for chunk in iter(lambda: handle.read(1048576), b""): digest.update(chunk)
                  observed[rel] = {"path": rel, "bytes": size, "sha256": digest.hexdigest()}
          if observed != expected:
              raise SystemExit("handoff manifest mismatch")
          PY
      - id: raw
        name: Download bounded model transcript
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.output_artifact }}
          path: ${{ runner.temp }}/wheelhouse-model-output

      - id: attempt
        name: Download durable pre-invocation checkpoint
        if: ${{ steps.raw.outcome != 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.output_artifact }}-attempt
          path: ${{ runner.temp }}/wheelhouse-model-attempt

      - id: result
        name: Normalize and bind the model result
        env:
          HANDOFF: ${{ runner.temp }}/wheelhouse-handoff
          HANDOFF_SHA256: ${{ inputs.handoff_sha256 }}
          RAW: ${{ runner.temp }}/wheelhouse-model-output
          ATTEMPT: ${{ runner.temp }}/wheelhouse-model-attempt
          NORMALIZED: ${{ runner.temp }}/wheelhouse-model-result
          EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
          MODEL_JOB_RESULT: ${{ needs.model.result }}
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/wheelhouse-finalize-pycache
        run: |
          set -euo pipefail
          mkdir -p "$NORMALIZED" "$PYTHONPYCACHEPREFIX"
          case "$PYTHONPYCACHEPREFIX" in
            "$HANDOFF"|"$HANDOFF"/*) echo "PYTHONPYCACHEPREFIX collides with signed handoff" >&2; exit 1 ;;
          esac
          unset PYTHONDONTWRITEBYTECODE
          task="$HANDOFF/bundle/task.json"
          result="$NORMALIZED/result.json"
          events="$NORMALIZED/events.ndjson"
          if [ "$GITHUB_SHA" != "$EXPECTED_COMMIT_SHA" ]; then
            PYTHONPATH="$HANDOFF/runtime" python - "$task" "$HANDOFF/bundle" "$EXPECTED_COMMIT_SHA" "$GITHUB_SHA" "$GITHUB_RUN_ID" "$CORRELATION_ID" "$result" "$events" <<'PY'
          import sys
          from agent_runtime.claude_bridge import write_revision_mismatch_result
          cancellation = {
              "requestStatus": "not-requested",
              "requestReturnCode": None,
              "terminalStatus": "",
              "terminalConclusion": "",
              "cancellationConfirmed": False,
          }
          write_revision_mismatch_result(
              sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4], sys.argv[5],
              "caller-commit", sys.argv[6], cancellation, sys.argv[7], sys.argv[8]
          )
          PY
          else
            proof=""
            execution=""
            delivered=""
            conclusion="failure"
            termination="controller-failure"
            if [ -f "$RAW/enforcement.json" ] && [ ! -L "$RAW/enforcement.json" ]; then
              proof="$RAW/enforcement.json"
              execution="$RAW/execution.json"
              if [ -f "$RAW/decision.json" ] && [ ! -L "$RAW/decision.json" ]; then delivered="$RAW/decision.json"; fi
              conclusion="success"
              termination="completed"
            elif [ -f "$ATTEMPT/enforcement.json" ] && [ ! -L "$ATTEMPT/enforcement.json" ]; then
              proof="$ATTEMPT/enforcement.json"
              if [ "$MODEL_JOB_RESULT" = "cancelled" ]; then
                conclusion="timed_out"
                termination="child-timeout"
              fi
            else
              echo "Claude model job produced neither a final artifact nor a durable checkpoint" >&2
              exit 1
            fi
            PYTHONPATH="$HANDOFF/runtime" python - "$proof" "$task" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$EXPECTED_COMMIT_SHA" "$CORRELATION_ID" "$conclusion" "$termination" <<'PY'
          import json, os, sys
          from pathlib import Path
          proof_path = Path(sys.argv[1])
          task = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          proof = json.loads(proof_path.read_text(encoding="utf-8"))
          limits = task["spec"]["limits"]
          proof["controller"] = {
              "parentRunId": sys.argv[3],
              "parentRunAttempt": sys.argv[4],
              "modelRunId": sys.argv[3],
              "hardDeadlineMs": None,
              "dispatchDeadlineMs": limits["dispatchDeadlineMs"],
              "childExecutionTimeoutMs": limits["childExecutionTimeoutMs"],
              "enforcedLimits": {
                  name: limits[name]
                  for name, quality in limits["enforcement"].items()
                  if quality == "externally-enforced"
              },
              "conclusion": sys.argv[7],
              "terminationReason": sys.argv[8],
              "dispatchRef": "caller-commit",
              "expectedCommitSha": sys.argv[5],
              "observedCommitSha": os.environ["GITHUB_SHA"],
              "correlationId": sys.argv[6],
              "cancellation": None,
          }
          temporary = proof_path.with_suffix(".tmp")
          temporary.write_text(json.dumps(proof, sort_keys=True, separators=(",", ":")) + "\n", encoding="utf-8")
          temporary.replace(proof_path)
          PY
            PYTHONPATH="$HANDOFF/runtime" python - "$task" "$HANDOFF/bundle" "$execution" "$delivered" "$proof" "$HANDOFF_SHA256" "$result" "$events" <<'PY'
          import sys
          from agent_runtime.claude_bridge import bridge
          bridge(*sys.argv[1:])
          PY
          fi
          cp "$task" "$NORMALIZED/task.json"
          PYTHONPATH="$HANDOFF/runtime" python - "$task" "$result" "$events" <<'PY'
          import sys
          from agent_runtime.contract import load_json_regular, verify_result_binding
          from agent_runtime.events import verify_result_event_binding
          task = load_json_regular(sys.argv[1])
          result = load_json_regular(sys.argv[2])
          verify_result_binding(task, result)
          verify_result_event_binding(result, sys.argv[3])
          PY
          status="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["status"])' "$result")"
          error_code="$(python -c 'import json,sys; print((json.load(open(sys.argv[1], encoding="utf-8")).get("error") or {}).get("code", ""))' "$result")"
          {
            echo "result_artifact=${{ inputs.output_artifact }}-result"
            echo "status=$status"
            echo "error_code=$error_code"
            echo "observed_commit_sha=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Upload verified normalized result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.result.outputs.result_artifact }}
          path: ${{ runner.temp }}/wheelhouse-model-result
          if-no-files-found: error
          retention-days: 1
