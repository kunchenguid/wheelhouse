name: Prepare Claude read-only model call
description: Packs and uploads an immutable AgentTask for the caller-commit-bound model job.
inputs:
  task: {required: true}
  bundle: {required: true}
  invocation-id: {required: true}
  allowed-repos: {required: false, default: "[]"}
outputs:
  input-artifact:
    value: ${{ steps.names.outputs.input }}
  output-artifact:
    value: ${{ steps.names.outputs.output }}
  result-artifact:
    value: ${{ steps.names.outputs.output }}-result
  handoff-sha256:
    value: ${{ steps.pack.outputs.manifestSha256 }}
  correlation-id:
    value: ${{ steps.names.outputs.correlation }}
  child-timeout-minutes:
    value: ${{ steps.names.outputs.child_timeout_minutes }}
runs:
  using: composite
  steps:
    - id: names
      shell: bash
      env:
        INVOCATION: ${{ inputs.invocation-id }}
        TASK: ${{ inputs.task }}
      run: |
        set -euo pipefail
        suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${INVOCATION}"
        read -r adapter timeout_ms < <(python -c 'import json,sys; t=json.load(open(sys.argv[1], encoding="utf-8")); print(t["spec"]["selection"]["candidates"][0]["adapter"], t["spec"]["limits"]["childExecutionTimeoutMs"] if t["spec"]["limits"]["childExecutionTimeoutMs"] is not None else t["spec"]["limits"]["hardDeadlineMs"])' "$TASK")
        if ! [[ "$timeout_ms" =~ ^[1-9][0-9]*$ ]]; then
          echo "Claude execution timeout must be a positive integer" >&2
          exit 1
        fi
        if [ "$adapter" = "claude-action-compat" ]; then
          if [ "$((timeout_ms % 60000))" -ne 0 ]; then
            echo "Claude action child execution timeout must use whole minutes" >&2
            exit 1
          fi
          timeout_minutes=$((timeout_ms / 60000))
        elif [ "$adapter" = "claude-cli" ]; then
          # The trusted supervisor owns the exact hard deadline. Keep two outer
          # minutes for setup and durable artifact upload after its process exits.
          timeout_minutes=$(((timeout_ms + 59999) / 60000 + 2))
        else
          echo "Claude model handoff selected an unsupported adapter" >&2
          exit 1
        fi
        echo "input=wheelhouse-claude-input-${suffix}" >> "$GITHUB_OUTPUT"
        echo "output=wheelhouse-claude-output-${suffix}" >> "$GITHUB_OUTPUT"
        echo "handoff=${RUNNER_TEMP}/wheelhouse-claude-handoff-${INVOCATION}" >> "$GITHUB_OUTPUT"
        echo "correlation=$(python -c 'import secrets; print(secrets.token_hex(16))')" >> "$GITHUB_OUTPUT"
        echo "child_timeout_minutes=$timeout_minutes" >> "$GITHUB_OUTPUT"

    - name: Record task-built stage
      shell: bash
      run: |
        python -m agent_runtime.admission \
          --task '${{ inputs.task }}' --stage task-built --status ok \
          --code task.built

    - id: pack
      name: Pack bounded content-addressed handoff
      shell: bash
      env:
        TASK: ${{ inputs.task }}
        BUNDLE: ${{ inputs.bundle }}
        HANDOFF: ${{ steps.names.outputs.handoff }}
        ALLOWED_REPOS: ${{ inputs.allowed-repos }}
      run: |
        set -euo pipefail
        python -m agent_runtime.claude_handoff pack \
          --task "$TASK" --bundle "$BUNDLE" --out "$HANDOFF" \
          --allowed-repos "$ALLOWED_REPOS"

    - name: Record handoff-packed stage
      shell: bash
      run: |
        python -m agent_runtime.admission \
          --task '${{ inputs.task }}' --stage handoff-packed --status ok \
          --code handoff.packed

    - name: Upload immutable model handoff
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.names.outputs.input }}
        path: ${{ steps.names.outputs.handoff }}
        if-no-files-found: error
        retention-days: 1
        include-hidden-files: true
